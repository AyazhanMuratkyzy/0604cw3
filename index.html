<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
</head>

<body class="min-h-[100vh] bg-pink-100 flex justify-center items-center">
  <div class="container w-[900px] h-[700px]  flex rounded-md bg-white">
    <div class="left w-[465px] h-auto rounded-ss-md">
      <img src="image-product-desktop.jpg" class="w-full h-full object-cover rounded-md">
    </div>
    <div class="right flex flex-col gap-9 p-10">
      <p class="text-gray-500 font-bold">Perfume</p>
      <h1 class="font-bold text-4xl">Gabrielle<br> Essence Eau<br> De Parfum</h1>
      <p class="text-gray-500">A floral, solar and voluptuous<br> interpretation composed by<br> Olivier Polge,
        Perfumer-Creator<br> for the House of CHANEL.</p>
      <div class="row flex gap-6">
        <h2 class="text-green-950 text-4xl font-bold font-serif">$149.99</h2>
        <p class="text-gray-500">$169.99</p>
      </div>
      <button class="bg-green-950 font-bold text-white text-center w-[200px] h-[40px] rounded-lg">Add to Cart</button>
    </div>
  </div>









</body>

</html>
